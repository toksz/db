<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Pro Chat 2026</title>
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --text: #f8fafc; --accent: #38bdf8; --user-msg: #0284c7; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 320px; background: var(--panel); border-right: 1px solid #334155; display: flex; flex-direction: column; padding: 20px; overflow-y: auto; }
        .sidebar h3 { margin-top: 0; color: var(--accent); }
        .setting-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.8rem; margin-bottom: 5px; color: #94a3b8; }
        input, select { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        
        .quota-card { background: #111827; padding: 12px; border-radius: 8px; margin-top: 10px; font-size: 0.75rem; border: 1px solid #1e293b; }
        .quota-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .model-tag { font-weight: bold; color: var(--accent); display: block; margin-bottom: 5px; }

        /* Chat Area */
        .main { flex: 1; display: flex; flex-direction: column; position: relative; background: #0b1120; }
        #chatBox { flex: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 18px; scroll-behavior: smooth; }
        
        .msg { max-width: 85%; padding: 14px 18px; border-radius: 15px; line-height: 1.5; font-size: 0.95rem; position: relative; }
        .user { align-self: flex-end; background: var(--user-msg); color: white; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: #1e293b; color: #e2e8f0; border-bottom-left-radius: 2px; border: 1px solid #334155; }
        .attachment-info { font-size: 0.75rem; margin-top: 8px; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.1); opacity: 0.8; }

        /* Input area */
        .input-area { padding: 20px; background: var(--bg); border-top: 1px solid #1e293b; }
        .input-box { max-width: 800px; margin: 0 auto; display: flex; gap: 10px; align-items: center; background: var(--panel); padding: 8px 15px; border-radius: 12px; border: 1px solid #334155; }
        #userInput { flex: 1; background: transparent; border: none; color: white; padding: 10px; outline: none; font-size: 1rem; }
        .file-btn { cursor: pointer; font-size: 1.2rem; color: #94a3b8; transition: 0.2s; padding: 5px; }
        .file-btn:hover { color: var(--accent); }
        #sendBtn { background: var(--accent); color: #0f172a; border: none; padding: 8px 18px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #sendBtn:disabled { opacity: 0.5; cursor: not-allowed; }
        #filePreview { font-size: 0.8rem; color: var(--accent); margin-bottom: 8px; text-align: center; height: 1.2rem; }
    </style>
</head>
<body>

<div class="sidebar">
    <h3>Gemini Studio</h3>
    
    <div class="setting-group">
        <label>API Key</label>
        <input type="password" id="apiKey" placeholder="Enter API Key...">
    </div>

    <div class="setting-group">
        <label>Active Model</label>
        <select id="modelSelect">
            <option value="gemini-3-flash-preview">Gemini 3 Flash (Fastest)</option>
            <option value="gemini-3.1-pro-preview">Gemini 3.1 Pro (Strongest)</option>
            <option value="gemini-3.1-flash-lite-preview">Gemini 3.1 Flash-Lite</option>
            <option value="gemini-2.5-flash">Gemini 2.5 Flash (Stable)</option>
            <option value="gemini-2.5-pro">Gemini 2.5 Pro (Stable)</option>
        </select>
    </div>

    <hr style="border:0; border-top:1px solid #334155; margin: 10px 0;">
    
    <label>Current Free Limits (RPM / RPD)</label>
    <div class="quota-card">
        <span class="model-tag">Gemini 3.1 Flash-Lite</span>
        <div class="quota-row"><span>Requests/Min:</span> <span>15</span></div>
        <div class="quota-row"><span>Requests/Day:</span> <span>500</span></div>
    </div>
    <div class="quota-card">
        <span class="model-tag">Gemini 3 Flash</span>
        <div class="quota-row"><span>Requests/Min:</span> <span>5</span></div>
        <div class="quota-row"><span>Requests/Day:</span> <span>20</span></div>
    </div>
    <div class="quota-card">
        <span class="model-tag">Gemini 2.5 Flash</span>
        <div class="quota-row"><span>Requests/Min:</span> <span>10</span></div>
        <div class="quota-row"><span>Requests/Day:</span> <span>250</span></div>
    </div>
</div>

<div class="main">
    <div id="chatBox">
        <div class="msg ai">Hello! I'm ready. You can send text, images, or PDFs. Which model would you like to test today?</div>
    </div>
    
    <div class="input-area">
        <div id="filePreview"></div>
        <div class="input-box">
            <label class="file-btn" title="Upload Image or PDF">
                📎 <input type="file" id="fileInput" hidden accept="image/*,application/pdf">
            </label>
            <input type="text" id="userInput" placeholder="Message Gemini..." autocomplete="off">
            <button id="sendBtn" onclick="handleSend()">Send</button>
        </div>
    </div>
</div>

<script>
    let chatHistory = [];
    let pendingFile = null;

    // Handle File Selection & Base64 conversion
    document.getElementById('fileInput').onchange = e => {
        const file = e.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = () => {
            pendingFile = {
                mimeType: file.type,
                data: reader.result.split(',')[1],
                name: file.name
            };
            document.getElementById('filePreview').innerText = `📎 Attached: ${file.name}`;
        };
        reader.readAsDataURL(file);
    };

    // Main Send Logic
    async function handleSend() {
        const apiKey = document.getElementById('apiKey').value.trim();
        const model = document.getElementById('modelSelect').value;
        const text = document.getElementById('userInput').value.trim();
        const sendBtn = document.getElementById('sendBtn');

        if (!apiKey) return alert("Please enter your API Key in the sidebar.");
        if (!text && !pendingFile) return;

        // UI Update
        appendMessage('user', text, pendingFile?.name);
        sendBtn.disabled = true;
        document.getElementById('userInput').value = "";
        document.getElementById('filePreview').innerText = "";

        // Build Payload Parts
        let parts = [];
        if (text) parts.push({ text: text });
        if (pendingFile) {
            parts.push({
                inlineData: { mimeType: pendingFile.mimeType, data: pendingFile.data }
            });
        }

        chatHistory.push({ role: "user", parts: parts });
        const loadingId = appendMessage('ai', "...");
        const currentFileAtSend = pendingFile; 
        pendingFile = null; // Clear for next message

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: chatHistory })
            });

            const data = await response.json();
            
            if (data.error) throw new Error(data.error.message);

            const aiResponse = data.candidates[0].content.parts[0].text;
            updateMessage(loadingId, aiResponse);
            
            // Save to history (Text only for model responses)
            chatHistory.push({ role: "model", parts: [{ text: aiResponse }] });

        } catch (err) {
            console.error(err);
            updateMessage(loadingId, `<span style="color:#f87171;">Error: ${err.message}</span>`);
            chatHistory.pop(); // Remove failed turn
        } finally {
            sendBtn.disabled = false;
            document.getElementById('userInput').focus();
        }
    }

    // UI Helpers
    function appendMessage(role, text, fileName) {
        const id = 'msg-' + Date.now();
        const chatBox = document.getElementById('chatBox');
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        div.id = id;
        
        let content = text ? text.replace(/\n/g, '<br>') : "";
        if (fileName) {
            content += `<div class="attachment-info">📄 ${fileName}</div>`;
        }
        
        div.innerHTML = content;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
        return id;
    }

    function updateMessage(id, text) {
        const div = document.getElementById(id);
        if (div) div.innerHTML = text.replace(/\n/g, '<br>');
        document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
    }

    // Enter Key Support
    document.getElementById('userInput').addEventListener('keypress', e => {
        if (e.key === 'Enter') handleSend();
    });
</script>

</body>
</html>
